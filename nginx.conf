worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 25m;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'host=$host';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Upstream: Gunicorn
    upstream flask_app {
        server os1-app:5000;
    }

    # ─────────────────────────────────────────────────────────
    # PORTAL SUBDOMAIN (public-facing, associate self-service)
    # ─────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name portal.optimussolutions.co.uk portal.local;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Root → redirect to portal login
        location = / {
            return 302 /portal/login;
        }

        # Portal routes (the associate portal blueprint)
        location /portal/ {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # Portal static assets (CSS, JS) — Blueprint serves at /portal/associate_static/
        location /portal/associate_static/ {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_valid 200 1h;
            expires 1h;
        }

        # Shared static assets (logos, images)
        location /static/images/ {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_valid 200 1h;
            expires 1h;
        }

        # Uploaded documents (associate docs only)
        location /static/uploads/associate_docs/ {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Block everything else — no staff routes accessible via portal subdomain
        location / {
            return 403;
        }
    }

    # ─────────────────────────────────────────────────────────
    # STAFF SUBDOMAIN (IP-restricted, full ATS access)
    # ─────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name app.optimussolutions.co.uk app.local localhost;

        # IP whitelist — only allow office/VPN IPs
        # UPDATE THESE before production deployment
        # allow 1.2.3.4;        # Office IP
        # allow 10.0.0.0/8;     # VPN range
        # deny all;

        # For local development, allow all
        allow all;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # All routes — staff gets full access
        location / {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }
    }

    # ─────────────────────────────────────────────────────────
    # DEFAULT — reject unknown hosts
    # ─────────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }
}
