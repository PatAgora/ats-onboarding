services:
  os1-nginx:
    image: nginx:alpine
    container_name: os1-nginx
    ports:
      - "80:80"
      # - "443:443"  # Uncomment when SSL certs are in ./certs/
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./certs:/etc/nginx/certs:ro  # Uncomment for SSL
    depends_on:
      - os1-app
    networks:
      - os1_network
    restart: unless-stopped

  os1-app:
    build: .
    container_name: os1-app
    # No external ports — nginx handles all external traffic
    expose:
      - "5000"
    env_file: .env
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://ats:ats_dev_password@os1-db:5432/ats
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      os1-db:
        condition: service_healthy
    networks:
      - os1_network
    restart: unless-stopped

  os1-db:
    image: postgres:16
    container_name: os1-db
    environment:
      POSTGRES_DB: ats
      POSTGRES_USER: ats
      POSTGRES_PASSWORD: ats_dev_password
    volumes:
      - os1_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ats -d ats"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - os1_network
    restart: unless-stopped

networks:
  os1_network:
    name: os1_network

volumes:
  os1_pgdata:
    name: os1_pgdata
