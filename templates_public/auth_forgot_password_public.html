<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Optimus Solutions</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --optimus-navy: #0a1628;
      --optimus-cyan: #00d4ff;
      --optimus-blue: #0066cc;
      --optimus-text-muted: #94a3b8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #334155;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--optimus-navy) 0%, #1a2744 50%, #0d1f3c 100%);
    }
    .auth-card {
      background: white;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .auth-header { text-align: center; margin-bottom: 2rem; }
    .auth-header h1 { font-size: 1.5rem; font-weight: 700; color: var(--optimus-navy); margin-bottom: 0.5rem; }
    .auth-header p { color: var(--optimus-text-muted); font-size: 0.9rem; }
    .form-label { font-weight: 500; font-size: 0.875rem; color: #475569; }
    .form-control { border-radius: 8px; padding: 0.75rem 1rem; border: 1px solid #e2e8f0; }
    .form-control:focus { border-color: var(--optimus-blue); box-shadow: 0 0 0 3px rgba(0,102,204,0.1); }
    .btn-primary {
      background: linear-gradient(135deg, var(--optimus-blue), var(--optimus-navy));
      border: none; border-radius: 8px; padding: 0.75rem; font-weight: 600; width: 100%;
    }
    .btn-primary:hover { opacity: 0.9; }
    .back-link { text-align: center; margin-top: 1.5rem; }
    .back-link a { color: var(--optimus-blue); text-decoration: none; font-size: 0.875rem; }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-header">
      <h1><i class="fas fa-key me-2"></i>Forgot Password</h1>
      <p>Enter your email address and we'll send you a password reset link.</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('public.forgot_password_post') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-paper-plane me-1"></i> Send Reset Link
      </button>
    </form>

    <div class="back-link">
      <a href="{{ url_for('public.login') }}"><i class="fas fa-arrow-left me-1"></i>Back to Sign In</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
