# nginx-dev.conf — Local development config
#
# Usage:
#   1. Add to /etc/hosts:
#      127.0.0.1  portal.local app.local
#   2. In docker-compose.yml, mount this instead of nginx.conf:
#      - ./nginx-dev.conf:/etc/nginx/nginx.conf:ro
#   3. docker compose up --build
#   4. Browse to http://portal.local or http://app.local

worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 25m;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'host=$host';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Upstream: Gunicorn
    upstream flask_app {
        server os1-app:5000;
    }

    # ─────────────────────────────────────────────────────────
    # PORTAL (local dev — no SSL, no IP restrictions)
    # ─────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name portal.local;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Root → redirect to portal login
        location = / {
            return 302 /portal/login;
        }

        # Portal routes
        location /portal/ {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # Portal static assets — Blueprint serves at /portal/associate_static/
        location /portal/associate_static/ {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Shared static (logos)
        location /static/images/ {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Uploaded associate documents
        location /static/uploads/associate_docs/ {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Block everything else
        location / {
            return 403;
        }
    }

    # ─────────────────────────────────────────────────────────
    # STAFF ATS (local dev — no IP restriction)
    # ─────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name app.local;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # All routes — staff gets full access
        location / {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }
    }

    # ─────────────────────────────────────────────────────────
    # DEFAULT — reject unknown hosts
    # ─────────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }
}
